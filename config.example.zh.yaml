  # 因为 Ollama 的 OpenAI 兼容端点 (/v1/chat/completions) 不会把 reasoning_content
  # 作为独立字段返回——思考内容要么被扁平化到 <think/> 标签里，要么直接丢了 (ollama/ollama#15293)
  # 而 Ollama 原生 API (/api/chat) 能正确分离思考内容和回复内容
