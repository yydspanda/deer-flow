# DeerFlow 应用配置文件
#
# 使用指南:
# - 把这个文件复制为 `config.yaml`，然后根据你的环境改一改就能用了
# - 默认情况下，DeerFlow 会在项目根目录找 `config.yaml` 这个文件
#   你可以通过设置环境变量 `DEER_FLOW_PROJECT_ROOT` 来指定项目根目录，
#   或者用 `DEER_FLOW_CONFIG_PATH` 直接指向某个具体的配置文件
# - 运行时状态默认存在项目根目录下的 `.deer-flow` 里，可以用
#   `DEER_FLOW_HOME` 环境变量改到别的可写目录
# - 所有字段值都支持环境变量替换，格式示例: `api_key: $OPENAI_API_KEY`
# - ★ `use` 字段的格式是 "包名.子包名.模块名:类名/变量名"
#   DeerFlow 启动时会通过 Python 反射机制（importlib）动态加载这个类
#   比如写 `langchain_openai:ChatOpenAI`，背后就是 from langchain_openai import ChatOpenAI

# ============================================================================
# 配置文件版本号（用来检测配置文件是不是太旧了）
# ============================================================================
# 当配置文件的 schema 发生变化时，把这个数字加 1
# 然后跑 `make config-upgrade` 就能把新字段合并到你本地的 config.yaml 里
config_version: 9

# ============================================================================
# 日志级别
# ============================================================================
# 控制 DeerFlow 各模块的日志输出详细程度
# 可选值: debug（最详细）/ info（默认）/ warning（只看警告）/ error（只看错误）
# 改了这个会怎样：设成 debug 能看到所有 HTTP 请求/响应细节，排查问题时很有用，
# 但正常运行时日志会特别多，影响性能
log_level: info

# ============================================================================
# Token 用量统计
# ============================================================================
# ★ 打开后，DeerFlow 会记录每次模型调用的 input/output/total token 数
# 然后在 workspace UI 里显示用量信息（前提是模型提供方返回了这些数据）
# 改了这个会怎样：关闭后你就看不到 token 消耗了，但能省一点点存储开销
token_usage:
  enabled: true

# ============================================================================
# ★★★ 模型配置（超重要！整个系统的核心）★★★
# ============================================================================
# 在这里配置你可以用的 LLM 模型
# DeerFlow 启动时会读取这个列表，通过 `use` 字段动态加载对应的模型类
#
# 关键字段说明:
#   name           - 模型的内部标识，在 subagents 等地方引用模型时用这个名字
#   display_name   - 在前端 UI 上显示的名字，给用户看的
#   ★ use          - 模型类的加载路径，格式 "模块路径:类名"
#                    比如 "langchain_openai:ChatOpenAI" 就是 from langchain_openai import ChatOpenAI
#                    比如 "deerflow.models.patched_deepseek:PatchedChatDeepSeek"
#                    就是 from deerflow.models.patched_deepseek import PatchedChatDeepSeek
#                    DeerFlow 会用 importlib 动态加载，改错了会启动报错
#   model          - 传给 API 的实际模型名（比如 gpt-4、deepseek-reasoner）
#   supports_thinking - 设为 true 表示这个模型支持"深度思考"模式（会输出思维链）
#                    打开后，agent 可以在 system prompt 里控制是否启用思考
#   supports_vision   - 设为 true 表示模型能看图（用于 view_image 工具）
#   supports_reasoning_effort - 设为 true 表示可以调节推理力度
#   ★ when_thinking_enabled  - 当思考模式开启时，往 API 请求里额外加什么参数
#   ★ when_thinking_disabled - 当思考模式关闭时，往 API 请求里额外加什么参数
#     这两个字段让你可以精细控制不同模型在思考开/关时的行为
#     比如有些模型需要在 extra_body.thinking.type 设 enabled/disabled
#     有些模型需要在 chat_template_kwargs.enable_thinking 设 true/false

models:
  # 示例：火山引擎（豆包）模型
  # - name: doubao-seed-1.8
  #   display_name: Doubao-Seed-1.8
  #   use: deerflow.models.patched_deepseek:PatchedChatDeepSeek
  #   model: doubao-seed-1-8-251228
  #   api_base: https://ark.cn-beijing.volces.com/api/v3
  #   api_key: $VOLCENGINE_API_KEY
  #   timeout: 600.0
  #   max_retries: 2
  #   supports_thinking: true
  #   supports_vision: true
  #   supports_reasoning_effort: true
  #   when_thinking_enabled:
  #     extra_body:
  #       thinking:
  #         type: enabled
  #   when_thinking_disabled:
  #     extra_body:
  #       thinking:
  #         type: disabled

  # 示例：OpenAI 模型
  # - name: gpt-4
  #   display_name: GPT-4
  #   use: langchain_openai:ChatOpenAI
  #   model: gpt-4
  #   api_key: $OPENAI_API_KEY # 用环境变量传入 API Key
  #   request_timeout: 600.0
  #   max_retries: 2
  #   max_tokens: 4096
  #   temperature: 0.7
  #   supports_vision: true # 开启视觉支持，让 view_image 工具能用

  # 示例：OpenAI Responses API 模型
  # - name: gpt-5-responses
  #   display_name: GPT-5 (Responses API)
  #   use: langchain_openai:ChatOpenAI
  #   model: gpt-5
  #   api_key: $OPENAI_API_KEY
  #   request_timeout: 600.0
