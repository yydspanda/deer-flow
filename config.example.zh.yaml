# ============================================================================
# ★ 工具分组配置
# ============================================================================
# 把工具按功能分组，方便管理和控制访问权限
# 这里的分组名会被 tools 配置里的 group 字段引用
# 比如 group: web 的工具都属于"网络操作"分组

tool_groups:
  - name: web
  - name: file:read
  - name: file:write
  - name: bash

# ============================================================================
# ★★★ 工具配置（核心！Agent 的手脚）★★★
# ============================================================================
# 配置 Agent 可以使用的工具
# ★ 关键字段说明:
#   name   - 工具名称，Agent 在对话中通过这个名字调用工具
#   ★ group - 工具所属的分组（要跟上面 tool_groups 里定义的名字对应）
#            代码里 get_available_tools() 函数会根据 group 来筛选工具
#            比如某些场景只允许用 file:read 分组的工具
#   ★ use  - 工具的加载路径，格式跟模型的 use 一样 "模块路径:函数名/类名"
#            比如 "deerflow.community.ddg_search.tools:web_search_tool"
#            启动时通过 importlib 动态加载，写错了会报 ImportError

tools:
  # 网页搜索工具（用 DuckDuckGo，不需要 API Key，开箱即用）
  - name: web_search
    group: web
    use: deerflow.community.ddg_search.tools:web_search_tool
    max_results: 5

  # 网页搜索工具（用 Serper - Google 搜索 API，需要 SERPER_API_KEY）
  # Serper 提供实时 Google 搜索结果，注册地址: https://serper.dev
  # 注意：启动前要在环境变量里设好 SERPER_API_KEY，或者取消下面 api_key 的注释直接填
  # - name: web_search
  #   group: web
  #   use: deerflow.community.serper.tools:web_search_tool
  #   max_results: 5
  #   # api_key: $SERPER_API_KEY  # 如果设了环境变量就可以不填这里

  # 网页搜索工具（需要 Tavily API Key）
  # - name: web_search
  #   group: web
  #   use: deerflow.community.tavily.tools:web_search_tool
  #   max_results: 5
  #   # api_key: $TAVILY_API_KEY  # 需要的话填上

  # 网页搜索工具（用 InfoQuest，需要 InfoQuest API Key）
  # - name: web_search
  #   group: web
  #   use: deerflow.community.infoquest.tools:web_search_tool
  #   # 限制搜索结果的时间范围，只返回指定时间范围内的内容。设为 -1 禁用时间过滤
  #   search_time_range: 10

  # 网页搜索工具（用 Exa，需要 EXA_API_KEY）
  # - name: web_search
  #   group: web
  #   use: deerflow.community.exa.tools:web_search_tool
  #   max_results: 5
  #   search_type: auto  # 可选: auto（自动）, neural（语义）, keyword（关键词）
  #   contents_max_characters: 1000
  #   # api_key: $EXA_API_KEY

  # 网页搜索工具（用 Firecrawl，需要 FIRECRAWL_API_KEY）
  # - name: web_search
  #   group: web
  #   use: deerflow.community.firecrawl.tools:web_search_tool
  #   max_results: 5
  #   # api_key: $FIRECRAWL_API_KEY

  # 网页抓取工具（用 Exa）
  # 注意：同时只能启用一个 web_fetch 工具
  # 启用这个之前，先把下面 Jina AI 的 web_fetch 注释掉
  # - name: web_fetch
  #   group: web
  #   use: deerflow.community.exa.tools:web_fetch_tool
  #   # api_key: $EXA_API_KEY

  # 网页抓取工具（用 Jina AI Reader）
  # 把网页内容转换成干净的文本，供 Agent 阅读理解
  - name: web_fetch
    group: web
    use: deerflow.community.jina_ai.tools:web_fetch_tool
    timeout: 10

  # 网页抓取工具（用 InfoQuest）
  # - name: web_fetch
  #   group: web
  #   use: deerflow.community.infoquest.tools:web_fetch_tool
  #   # 整个爬取过程的总超时时间（秒）。设为正数启用，-1 禁用
  #   timeout: 10
  #   # 页面加载后的等待时间（秒）。设为正数启用，-1 禁用
  #   fetch_time: 10
  #   # 导航到页面的超时时间（秒）。设为正数启用，-1 禁用
  #   navigation_timeout: 30

  # 网页抓取工具（用 Firecrawl，需要 FIRECRAWL_API_KEY）
  # - name: web_fetch
  #   group: web
  #   use: deerflow.community.firecrawl.tools:web_fetch_tool
  #   # api_key: $FIRECRAWL_API_KEY

  # 图片搜索工具（用 DuckDuckGo）
  # 在生成图片之前可以用它找参考图
  - name: image_search
    group: web
    use: deerflow.community.image_search.tools:image_search_tool
    max_results: 5

  # 图片搜索工具（用 InfoQuest）
  # - name: image_search
  #   group: web
  #   use: deerflow.community.infoquest.tools:image_search_tool
  #   # 限制图片搜索结果的时间范围。设为 -1 禁用时间过滤
  #   image_search_time_range: 10
  #   # 图片尺寸过滤。可选: "l"（大）, "m"（中）, "i"（图标）
  #   image_size: "i"

  # 文件操作工具
  # 这些工具都通过 sandbox（沙箱）执行，保证安全性
  - name: ls
    group: file:read
    use: deerflow.sandbox.tools:ls_tool

  - name: read_file
    group: file:read
    use: deerflow.sandbox.tools:read_file_tool

  - name: glob
    group: file:read
    use: deerflow.sandbox.tools:glob_tool
    max_results: 200

  - name: grep
    group: file:read
    use: deerflow.sandbox.tools:grep_tool
    max_results: 100

  - name: write_file
    group: file:write
    use: deerflow.sandbox.tools:write_file_tool

  - name: str_replace
    group: file:write
    use: deerflow.sandbox.tools:str_replace_tool

  # Bash 命令执行工具
  # 只有在使用隔离沙箱，或者显式设置 sandbox.allow_host_bash: true 时才会激活
  # ★ 安全提醒：这个工具能让 Agent 在你的机器上执行任意命令！
  # 务必了解 sandbox 配置里的安全设置
  - name: bash
    group: bash
    use: deerflow.sandbox.tools:bash_tool

# ============================================================================
# ★ 工具搜索配置（延迟加载工具）
# ============================================================================
# 开启后，MCP 工具不会直接加载到 Agent 的上下文里
# 而是在系统提示词中列出工具名称，运行时通过 tool_search 工具按需查找
# 这样做的好处：当多个 MCP 服务器暴露大量工具时，
# 能减少上下文占用、提高工具选择的准确度
# 改了这个会怎样：开了之后工具不会一次性全塞进 prompt，而是按需查找
# 工具特别多的时候建议开启

tool_search:
  enabled: false

# ============================================================================
# ★ 循环检测配置（防止 Agent 陷入死循环）
# ============================================================================
# 检测并打断重复的相同工具调用循环
# 频率阈值是安全限制，防止同一个工具类型被过度使用
# 改了这些会怎样：阈值太低可能误判正常操作，太高又拦不住真死循环
# 建议先用默认值，遇到问题再调

loop_detection:
  enabled: true
  warn_threshold: 3      # 连续相同调用超过这么多次就发警告
  hard_limit: 5          # 连续相同调用超过这么多次就强制打断
  window_size: 20        # 检测窗口大小（看最近多少步操作）
  max_tracked_threads: 100  # 最多跟踪多少个并发线程
  tool_freq_warn: 30     # 单个工具在窗口内使用这么多次就警告
  tool_freq_hard_limit: 50  # 单个工具在窗口内使用这么多次就强制打断
  # 可以针对特定工具覆盖上面的频率阈值。值可以比全局默认值高或低
  # 常见用法：给 bash 这种高频工具提高阈值（比如批量 RNA-seq 流水线场景）
  # 而不影响其他工具的保护
  # tool_freq_overrides:
  #   bash:
  #     warn: 150
  #     hard_limit: 300

# ============================================================================
# ★★★ 沙箱配置（安全核心！决定了 Agent 在哪执行命令）★★★
# ============================================================================
# 选择本地沙箱（直接在本机执行）还是基于 Docker 的 AIO 沙箱（容器隔离）
#
# ★ LocalSandbox vs AioSandbox 的区别：
#   LocalSandbox - 直接在你本机执行命令，没有隔离，速度最快
#     风险：Agent 执行的 bash 命令就是你本机的命令，能读写你的文件
#     适合：个人开发、完全信任的场景
#   AioSandbox - 在 Docker/Apple Container 里执行，有完整隔离
#     安全：即使 Agent 搞破坏也只影响容器内部
#     适合：生产环境、多人使用、不信任的输入源

# 方案 1：本地沙箱（默认）
# 直接在本机执行命令，速度快但无隔离
uploads:
  # 应用层上传限制，由网关强制执行，前端也会看到这些限制
  max_files: 10
  max_file_size: 52428800    # 50 MiB
  max_total_size: 104857600  # 100 MiB
  # 自动 Office/PDF 转换在后端主机上运行（在沙箱隔离之前）
  # 除非上传来自完全可信的来源且你明确接受主机端解析器风险，否则保持关闭
  auto_convert_documents: false
  # 控制用哪个 PDF 转 Markdown 的转换器
  # 自动上传转换由上面的 auto_convert_documents 单独控制
  # auto        - 优先用 pymupdf4llm（如果装了的话）；遇到图片型或加密 PDF 时
  #               回退到 MarkItDown（推荐的默认值）
  # pymupdf4llm - 始终用 pymupdf4llm（需要先装: uv add pymupdf4llm）
  #               标题/表格提取效果更好，大多数文件也更快
  # markitdown  - 始终用 MarkItDown（原始行为，不需要额外依赖）
  pdf_converter: auto

sandbox:
  use: deerflow.sandbox.local:LocalSandboxProvider
  # ★ allow_host_bash 的安全说明：
  # 默认关闭是因为 LocalSandboxProvider 不是安全的 shell 访问隔离边界
  # 设为 true = Agent 能直接在你本机执行任意 bash 命令
  # 只有在完全信任的、单用户本地工作流中才开启
  # 改了这个会怎样：开了之后 bash 工具就能用了，但 Agent 可以执行任何命令
  allow_host_bash: false
  # 可选：把本机额外目录挂载到沙箱里
  # 每个挂载项把一个本机路径映射到 Agent 可以访问的虚拟容器路径
  # mounts:
  #   - host_path: /home/user/my-project    # 本机上的绝对路径
  #     container_path: /mnt/my-project     # 沙箱内的虚拟路径
  #     read_only: true                     # 是否只读（默认 false）

  # 工具输出截断限制（字符数）
  # bash 用中间截断（保留头+尾），因为错误信息可能出现在输出的任何位置
  # read_file 和 ls 用头部截断，因为内容是从前往后的
  # 设为 0 禁用截断
  bash_output_max_chars: 20000
  read_file_output_max_chars: 50000
  ls_output_max_chars: 20000

# 方案 2：基于容器的 AIO 沙箱
# 在隔离的容器中执行命令（Docker 或 Apple Container）
# macOS 上：自动优先用 Apple Container（如果可用），否则回退到 Docker
# 其他平台：使用 Docker
# 取消注释即可启用:
# sandbox:
#   use: deerflow.community.aio_sandbox:AioSandboxProvider
#
#   # 可选：容器镜像（Docker 和 Apple Container 都支持）
#   # 默认: enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest
#   # 推荐: enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest (x86_64 和 arm64 都能用)
#   # image: enterprise-public-cn-beijing.cr.volces.com/vefaas-public/all-in-one-sandbox:latest
#
#   # 可选：沙箱容器的基础端口（默认: 8080）
#   # port: 8080

#   # 可选：最大并发沙箱容器数（默认: 3）
#   # 达到上限后，最久没用的沙箱会被驱逐来腾位置给新的
#   # 填正整数；不填就用默认值
#   # replicas: 3
#
#   # 可选：容器名前缀（默认: deer-flow-sandbox）
#   # container_prefix: deer-flow-sandbox
#
#   # 可选：从本机挂载额外目录到容器
#   # 注意：skills 目录会自动从 skills.path 挂载到 skills.container_path
#   # mounts:
#   #   # 其他自定义挂载
#   #   - host_path: /path/on/host
#   #     container_path: /home/user/shared
#   #     read_only: false
#   #
#   #   # DeerFlow 会把配置的 container_path 告知 Agent，
#   #   # 这样 Agent 就能直接读写挂载的目录（比如 /home/user/shared）
#
#   # 可选：注入到沙箱容器的环境变量
#   # 以 $ 开头的值会从宿主机的环境变量中解析
#   # environment:
#   #   NODE_ENV: production
#   #   DEBUG: "false"
#   #   API_KEY: $MY_API_KEY        # 从宿主机的 MY_API_KEY 环境变量读取
#   #   DATABASE_URL: $DATABASE_URL  # 从宿主机的 DATABASE_URL 环境变量读取

# 方案 3：由 Provisioner 管理的 AIO 沙箱（docker-compose-dev 部署方式）
# 每个 sandbox_id 在 k3s 里分配一个专属 Pod，由 provisioner 管理
# 适合生产环境或需要更好隔离性和扩展性的高级用户:
# sandbox:
#   use: deerflow.community.aio_sandbox:AioSandboxProvider
#   provisioner_url: http://provisioner:8002

# ============================================================================
# ★★★ 子 Agent 配置（并行工作的幕后英雄）★★★
# ============================================================================
# 配置子 Agent 的执行超时等参数
# 子 Agent 是由主 Agent 派出去干活的"后台打工人"
# ★ 关键概念：
#   timeout_seconds - 子 Agent 最长能跑多久，超时就强制终止
#   max_turns       - 子 Agent 最多能执行多少轮工具调用
#   model           - 子 Agent 用的模型，设 "inherit" 继承主 Agent 的模型
#   custom_agents   - 自定义子 Agent，可以有自己的 prompt、工具、技能列表
#
# ★ 改了这些会怎样：
#   timeout 太短 → 复杂任务会超时失败
#   timeout 太长 → 一个卡住的 Agent 会占住资源很久
#   model: "inherit" → 子 Agent 跟主 Agent 用同一个模型（省钱）
#   model: "其他模型名" → 子 Agent 用指定模型（可以给简单任务用便宜模型）

# subagents:
#   # 所有子 Agent 的默认超时时间（秒）（默认: 900 = 15 分钟）
#   timeout_seconds: 900
#   # 可选的全局最大轮次覆盖
#   # max_turns: 120
#
#   # 可选的按 Agent 类型覆盖（对内置和自定义 Agent 都生效）
#   agents:
#     general-purpose:
#       timeout_seconds: 1800  # 30 分钟，给复杂多步任务留够时间
#       max_turns: 160
#       # model: qwen3:32b     # 指定一个特定模型（默认: 继承主 Agent 的模型）
#       # skills:               # 技能白名单（默认: 继承所有已启用的技能）
#       #   - web-search
#       #   - data-analysis
#     bash:
#       timeout_seconds: 300   # 5 分钟，快速命令执行够用了
#       max_turns: 80
#       # skills: []            # 不给 bash Agent 分配技能
#
#   # ★ 自定义子 Agent 类型：定义拥有自己 prompt、工具、技能、模型配置的专门化 Agent
#   # 自定义 Agent 通过 `task` 工具使用，和内置类型（general-purpose、bash）并列
#   # custom_agents:
#   #   analysis:
#   #     description: "数据分析专家，负责处理数据集并生成洞察"
#   #     system_prompt: |
#   #       你是一个数据分析子 Agent。专注于：
#   #       - 处理和分析数据集
#   #       - 生成可视化图表
#   #       - 提供统计洞察
#   #     tools:                  # 工具白名单（null = 继承所有）
#   #       - bash
#   #       - read_file
#   #       - write_file
#   #     skills:                 # 技能白名单（null = 继承所有, [] = 不要任何技能）
#   #       - data-analysis
#   #       - visualization
#   #     model: inherit          # 'inherit' 表示用父 Agent 的模型
#   #     max_turns: 80
#   #     timeout_seconds: 600
#
#   # ★ 模型覆盖说明：默认情况下子 Agent 继承主 Agent 的模型
#   # 设置 `model` 可以用不同的模型（比如用本地 Ollama 模型省钱）
#   # 模型名必须跟上面 `models:` 部分里定义的 name 一致

# ============================================================================
# ACP Agent 配置
# ============================================================================
# 配置外部 ACP 兼容的 Agent，用于内置的 `invoke_acp_agent` 工具
# ACP = Agent Communication Protocol，让 DeerFlow 能调用外部 Agent（如 Claude Code、Codex）

# acp_agents:
#   claude_code:
#     # DeerFlow 需要一个 ACP 适配器。标准的 `claude` CLI 不直接支持 ACP
#     # 需要单独安装 `claude-agent-acp` 或者用下面的方式:
#     command: npx
#     args: ["-y", "@zed-industries/claude-agent-acp"]
#     description: Claude Code 用于实现、重构和调试
#     model: null
#     # auto_approve_permissions: false  # 设为 true 自动批准 ACP 权限请求
#     # env:                             # 可选：注入环境变量到 Agent 子进程
#     #   ANTHROPIC_API_KEY: $ANTHROPIC_API_KEY  # $VAR 从宿主机环境变量解析
#
#   codex:
#     # DeerFlow 需要一个 ACP 适配器。标准的 `codex` CLI 不直接支持 ACP
#     # 需要单独安装 `codex-acp` 或者用下面的方式:
#     command: npx
#     args: ["-y", "@zed-industries/codex-acp"]
#     description: Codex CLI 用于仓库任务和代码生成
#     model: null
#     # auto_approve_permissions: false  # 设为 true 自动批准 ACP 权限请求
#     # env:                             # 可选：注入环境变量到 Agent 子进程
#     #   OPENAI_API_KEY: $OPENAI_API_KEY  # $VAR 从宿主机环境变量解析

# ============================================================================
# ★ 技能配置
# ============================================================================
# 配置技能目录，用于专门的 Agent 工作流
# 技能就是一组预定义的 prompt + 工具组合，让 Agent 在特定场景下表现更好

skills:
  # 技能目录在本机的路径（相对于项目根目录，或写绝对路径）
  # 默认: 项目根目录下的 skills 目录
  # 当这个字段省略时，可以用 DEER_FLOW_SKILLS_PATH 环境变量覆盖
  # 取消注释来自定义:
  # path: /absolute/path/to/custom/skills

  # 技能在沙箱容器内被挂载到的路径
  # Agent 通过这个路径在本地和 Docker 沙箱中访问技能文件
  # 默认: /mnt/skills
  container_path: /mnt/skills

# 注意：要限制某个自定义 Agent 加载哪些技能，
# 在该 Agent 的 `config.yaml`（如 `agents/my-agent/config.yaml`）里定义 `skills` 列表:
# - 省略或 null: 加载所有全局启用的技能（默认）
# - []: 禁用该 Agent 的所有技能
# - ["skill-name"]: 只加载特定技能

# ============================================================================
# 对话标题生成配置
# ============================================================================
# 自动给对话生成标题的设置
# 改了这些会怎样：max_words/max_chars 控制标题的长度上限
# model_name 可以指定用便宜模型生成标题，省钱

title:
  enabled: true
  max_words: 6
  max_chars: 60
  model_name: null # 用默认模型（models 列表里的第一个模型）

# ============================================================================
# ★ 对话摘要配置（长对话的救星）
# ============================================================================
# 当 token 数接近限制时，自动对对话历史做摘要
# 这样就能在长对话中保持上下文，不会超过模型的 token 上限
# 改了这些会怎样：关了的话，超长对话会直接报错（超过模型 context window）
# 建议保持开启，尤其是经常进行长对话的场景

summarization:
  enabled: true

  # 摘要用的模型（null = 用默认模型）
  # 推荐：用轻量级、便宜的模型，比如 "gpt-4o-mini" 之类的
  # 省钱技巧：这里用便宜模型，主 Agent 用贵模型
  model_name: null

  # 触发条件 — 至少需要一个
  # 摡要会在任意一个阈值被触发时执行（OR 逻辑）
  # 可以指定单个触发条件，也可以指定多个
  trigger:
    # 当 token 数达到 15564 时触发摘要
    - type: tokens
      value: 15564
    # 取消注释：当消息数达到 50 条时也触发
    # - type: messages
    #   value: 50
    # 取消注释：当达到模型最大输入 token 数的 80% 时触发
    # - type: fraction
    #   value: 0.8

  # 摘要后保留多少最近的历史上下文
  # 指定保留最近的多少内容不被摘要吃掉
  keep:
    # 保留最近 10 条消息（推荐值）
    type: messages
    value: 10
    # 备选：保留指定数量的 token
    # type: tokens
    # value: 3000
    # 备选：保留模型最大输入 token 数的比例
    # type: fraction
    # value: 0.3

  # 准备摘要消息时的最大 token 数
  # 设为 null 跳过裁剪（超长对话不建议跳过）
  trim_tokens_to_summarize: 15564

  # 自定义摘要提示词模板（null = 用 LangChain 的默认提示词）
  # 这个提示词应该引导模型提取重要的上下文信息
  summary_prompt: null

  # 最近加载的技能文件会被排除在摘要之外，这样 Agent 在摘要压缩后
  # 不会丢失技能指令。Claude Code 也用了类似的策略（保留最近约 5 个技能，
  # 总共约 25k token，每个技能上限约 5k token）
  # 把 preserve_recent_skill_count 设为 0 可以禁用这个功能
  preserve_recent_skill_count: 5
  preserve_recent_skill_tokens: 25000
  preserve_recent_skill_tokens_per_skill: 5000
  skill_file_read_tool_names:
    - read_file
    - read
    - view
    - cat

# ============================================================================
# ★ 记忆配置（让 Agent 记住你）
# ============================================================================
# 全局记忆机制
# 存储用户信息和对话历史，让 Agent 的回复更有个性化
# 改了这些会怎样：关了之后 Agent 就变成"金鱼记忆"了，每次对话都不记得你
# max_facts 控制最多记住多少条事实，改大了占更多存储但记忆更丰富

memory:
  enabled: true
  storage_path: memory.json # 相对于 backend 目录的路径
  debounce_seconds: 30 # 处理排队的更新前等待的时间（秒）
  model_name: null # 用默认模型
  max_facts: 100 # 最多存储多少条事实
  fact_confidence_threshold: 0.7 # 存储事实的最低置信度（0-1 之间）
  injection_enabled: true # 是否把记忆注入到系统提示词中
  max_injection_tokens: 2000 # 记忆注入的最大 token 数

# ============================================================================
# 自定义 Agent 管理 API
# ============================================================================
# 控制 HTTP 网关是否暴露自定义 Agent 的 SOUL/USER.md 管理接口
# 除非网关在受信任的、有认证的管理边界后面，否则保持关闭
# 改了这些会怎样：开了之后可以通过 API 修改 Agent 的人格和行为，有安全风险

agents_api:
  enabled: false

# ============================================================================
# 技能自我进化配置
# ============================================================================
# 允许 Agent 自主在 skills/custom/ 目录下创建和改进技能
# 改了这些会怎样：开了之后 Agent 能自己写新技能，但也要承担它写出有问题的代码的风险

skill_evolution:
  enabled: false # 设为 true 允许 Agent 在 skills/custom 下写入文件
  moderation_model_name: null # 用于 LLM 安全校验的模型（null = 用默认模型）

# ============================================================================
# 检查点配置（已废弃 — 请改用 `database` 配置）
# ============================================================================
# 旧版独立的检查点配置，保留是为了向后兼容
# 推荐用下面统一的 `database` 部分，它同时驱动 LangGraph 检查点
# 和 DeerFlow 应用数据（运行记录、反馈、事件）
#
# 如果同时配了 `checkpointer` 和 `database`，`checkpointer` 对
# LangGraph 状态持久化有更高的优先级
#
# checkpointer:
#   type: sqlite
#   connection_string: checkpoints.db
#
# checkpointer:
#   type: postgres
#   connection_string: postgresql://user:password@localhost:5432/deerflow

# ============================================================================
# ★ 数据库配置
# ============================================================================
# 统一的存储后端，同时用于 LangGraph 检查点和 DeerFlow
# 应用数据（运行记录、线程元数据、反馈等）
#
# backend: memory  -- 不持久化，重启数据就没了
# backend: sqlite  -- 单节点部署，文件存在 sqlite_dir 里
# backend: postgres -- 生产环境多节点部署
#
# 如果在 config.yaml 里省略或留空这个部分，DeerFlow 会使用:
#   backend: sqlite
#   sqlite_dir: .deer-flow/data
#
# SQLite 模式用一个 deerflow.db 文件，带 WAL 日志模式，
# 同时存检查点和应用数据
#
# Postgres 模式：把连接 URL 放到 .env 里的 DATABASE_URL，
# 然后在这里用 $DATABASE_URL 引用
#
# 安装驱动 — Issue #2754 的修复让 `UV_EXTRAS` 在所有代码路径中都生效:
#   本地开发    `make dev` 会从下面的 `database.backend: postgres` 自动检测
#              并在每次重启时传 `--extra postgres` 给 `uv sync`，
#              所以额外的依赖不会被清掉。要显式启用（或组合多个 extra
#              如 `postgres,ollama`），在项目根目录的 .env 里设置:
#                  UV_EXTRAS=postgres
#   Docker 开发 `make docker-start` 通过 `env_file` 从项目根目录的 .env 读取 `UV_EXTRAS`。设置:
#                  UV_EXTRAS=postgres
#              支持多个 extra（`postgres,ollama`）— 参见
#              docker/dev-entrypoint.sh
#   Docker 镜像 构建参数 `UV_EXTRAS=postgres docker compose build` —
#              构建时只支持单个 extra（backend/Dockerfile 把值作为一个
#              整体传给 `--extra`）
#
# 首次初始化（在 `make dev` 之前）:
#   cd backend && uv sync --all-packages --extra postgres
#   (--all-packages 会把 extra 传到 workspace 成员里 — 见 PR #2584)
#
# 注意：当同时配了 `checkpointer` 和 `database` 时，
# `checkpointer` 对 LangGraph 状态持久化有更高的优先级。
# 如果你用了 `database`，就可以删掉 `checkpointer` 部分了。
# database:
#   backend: sqlite
#   sqlite_dir: .deer-flow/data
#
# database:
#   backend: postgres
#   postgres_url: $DATABASE_URL
database:
  backend: sqlite
  sqlite_dir: .deer-flow/data

# ============================================================================
# 运行事件配置
# ============================================================================
# 运行事件（消息 + 执行追踪）的存储后端
#
# backend: memory  -- 不持久化，重启数据就没了（默认）
# backend: db      -- 通过 ORM 存 SQL 数据库，支持完整查询（生产环境推荐）
# backend: jsonl   -- 只追加的 JSONL 文件（轻量级单节点持久化）
#
# run_events:
#   backend: memory
#   max_trace_content: 10240    # 追踪内容的截断阈值（db 后端，字节）
#   track_token_usage: true     # 累计 token 数到 RunRow
run_events:
  backend: memory
  max_trace_content: 10240
  track_token_usage: true

