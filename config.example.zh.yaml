# ============================================================================
# ★ 安全护栏配置
# ============================================================================
# 可选的工具调用执行前授权机制
# 开启后，每个工具调用都会先经过配置的 provider 审批才能执行
# 三种方案：内置白名单、OAP 策略提供者、自定义提供者
# 完整文档见 backend/docs/GUARDRAILS.md
#
# Provider 通过类路径加载（跟模型/工具的 use 字段一样的机制，都用 resolve_variable）

# --- 方案 1：内置 AllowlistProvider（零外部依赖）---
# guardrails:
#   enabled: true
#   provider:
#     use: deerflow.guardrails.builtin:AllowlistProvider
#     config:
#       denied_tools: ["bash", "write_file"]

# --- 方案 2：OAP passport 提供者（开放标准，任意实现）---
#   Open Agent Passport (OAP) 规范定义了护照格式和决策码
#   任何 OAP 兼容的提供者都行。下面是 APort（参考实现）的示例:
#     pip install aport-agent-guardrails && aport setup --framework deerflow
# guardrails:
#   enabled: true
#   provider:
#     use: aport_guardrails.providers.generic:OAPGuardrailProvider

# --- 方案 3：自定义提供者（任何有 evaluate/aevaluate 方法的类）---
# guardrails:
#   enabled: true
#   provider:
#     use: my_package:MyGuardrailProvider
#     config:
#       key: value

# ============================================================================
# ★ 熔断器配置（保护 LLM 调用）
# ============================================================================
# 熔断器防止反复向一个正在出错的模型提供方发送请求
# 当连续失败次数达到阈值后，后续请求会直接快速失败，直到恢复期结束
#
# 这在以下场景很有用:
# - 避免在提供方故障期间被限速封禁
# - 减少重试循环导致的资源耗尽
# - 在 LLM 服务不可用时优雅降级
#
# 改了这些会怎样：
#   failure_threshold 太低 → 偶尔的网络波动就会触发熔断
#   failure_threshold 太高 → 真出问题了也不会熔断，白白浪费请求
#   recovery_timeout_sec → 熔断后等多久再试一次

# circuit_breaker:
#   # 连续失败多少次后触发熔断（默认: 5）
#   failure_threshold: 5
#   # 熔断后等待多少秒再尝试恢复（默认: 60）
#   recovery_timeout_sec: 60
