# yyds: DeerFlow 本地开发 nginx 反向代理配置
# 被 serve.sh 启动：nginx -c docker/nginx/nginx.local.conf
# 监听端口 2026，把请求按路径转发到不同的后端服务
#
# 架构：
#   浏览器 → nginx(:2026)
#     ├── /api/langgraph/*  → rewrite 去掉前缀 → Gateway(:8001)
#     ├── /api/*            → Gateway(:8001)
#     └── /*                → Frontend(:3000)
#
# 关键配置说明：
#   - worker_connections 1024：最大并发连接数（dev 够用了）
#   - 没有 worker_processes：默认 1 个 worker（dev 不需要多进程）
#   - CORS：nginx 集中处理，避免 Gateway 和 Frontend 各设各的导致重复
#   - SSE 流式：三件套（proxy_buffering off + proxy_cache off + X-Accel-Buffering no）
#   - 超时 600s：Agent 思考可能很久，不能 60s 就超时

events {
    worker_connections 1024;
}

# yyds: PID 文件放在项目目录下（不污染系统 nginx）
pid logs/nginx.pid;

http {
    # ── 基础设置 ──────────────────────────────────────────────────────────────
    # sendfile:       用操作系统的零拷贝发送文件（性能好）
    # tcp_nopush:     和 sendfile 配合，一次发完一个完整的 HTTP 响应头+体
    # tcp_nodelay:    禁用 Nagle 算法，小包立即发送（适合 SSE 流式）
    # keepalive_timeout: 长连接保持 65 秒
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ── 日志 ──────────────────────────────────────────────────────────────────
    # yyds: 日志也放在项目目录下，方便查看：logs/nginx-access.log / logs/nginx-error.log
    access_log logs/nginx-access.log;
    error_log logs/nginx-error.log;

    # ── 上游服务定义 ──────────────────────────────────────────────────────────
    # yyds: 定义两个"上游"（backend 服务），后面用名字引用
    #       gateway  = Gateway API 服务器（Agent 运行时 + REST API）
    #       frontend = Next.js 开发服务器（前端页面）
    upstream gateway {
        server 127.0.0.1:8001;
    }

    upstream frontend {
        server 127.0.0.1:3000;
    }

    # ── 主服务器 ──────────────────────────────────────────────────────────────
    server {
        # yyds: 监听 2026 端口（IPv4 + IPv6）
        #       这就是为什么浏览器访问 http://localhost:2026
        listen 2026;
        listen [::]:2026;
        server_name _;

        # ── CORS 跨域处理 ─────────────────────────────────────────────────────
        # yyds: 为什么 nginx 要管 CORS？
        #   前端(:3000) 和 API(:8001) 端口不同 = 跨域
        #   浏览器会先发 OPTIONS 预检请求，这里统一处理
        #   先 proxy_hide_header 隐藏上游返回的 CORS 头（防止重复）
        #   再 add_header 加 nginx 自己的 CORS 头

        # Hide CORS headers from upstream to prevent duplicates
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
        proxy_hide_header 'Access-Control-Allow-Credentials';

        # CORS headers for all responses (nginx handles CORS centrally)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*' always;

        # Handle OPTIONS requests (CORS preflight)
        # yyds: 浏览器跨域请求前先发 OPTIONS 预检，直接返回 204 No Content
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # ── 路由规则 ──────────────────────────────────────────────────────────
        # yyds: nginx 的 location 匹配规则（从上到下，最长前缀优先）：
        #   1. /api/langgraph/*  → rewrite 去掉 langgraph 前缀 → Gateway
        #   2. /api/models       → Gateway
        #   3. /api/memory       → Gateway
        #   4. /api/mcp          → Gateway
        #   5. /api/skills       → Gateway
        #   6. /api/agents       → Gateway
        #   7. /api/threads/*/uploads → Gateway（大文件上传）
        #   8. /api/threads      → Gateway
        #   9. /api/docs, /api/redoc, /openapi.json → Gateway（API 文档）
        #  10. /health           → Gateway
        #  11. /api/*            → Gateway（兜底，auth 模块等走这里）
        #  12. /*                → Frontend（兜底，页面和静态资源）

        # ── LangGraph API 路由 ────────────────────────────────────────────────
        # LangGraph-compatible API routes served by Gateway.
        # yyds: 这是最重要的路由！
        #       前端调用 /api/langgraph/threads/xxx/runs/stream
        #       nginx rewrite 成 /api/threads/xxx/runs/stream → 转给 Gateway
        #       "break" 表示 rewrite 后不再重新匹配 location
        # Rewrites /api/langgraph/* to /api/* before proxying to Gateway.
        location /api/langgraph/ {
            rewrite ^/api/langgraph/(.*) /api/$1 break;
            proxy_pass http://gateway;
            proxy_http_version 1.1;

            # Headers
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            # yyds: Connection '' 清空 Connection 头，让 HTTP/1.1 长连接正常工作
            proxy_set_header Connection '';

            # SSE/Streaming support
            # yyds: SSE 流式三件套——缺任何一个都会导致前端收不到流式响应：
            #   proxy_buffering off     → 不缓存上游响应，收到就转
            #   proxy_cache off         → 不缓存到磁盘
            #   X-Accel-Buffering no    → 告诉 nginx 上游不要缓冲（响应头）
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Accel-Buffering no;

            # Timeouts for long-running requests
            # yyds: 600 秒超时。Agent 思考/搜索/执行工具可能很久，
            #       默认 60 秒太短会导致长请求被 nginx 切断
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;

            # Chunked transfer encoding
            # yyds: 分块传输编码，SSE 流式响应必须
            chunked_transfer_encoding on;
        }

        # ── Gateway REST API 路由 ─────────────────────────────────────────────
        # yyds: 以下每个 location 都把请求原样转给 Gateway(:8001)
        #       没有特殊配置的就不加额外注释了

        # Custom API: Models endpoint
        location /api/models {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Disable buffering to avoid permission errors when nginx
            # runs as a non-root user (e.g. local development).
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Forwarded-Host $http_host;
        }

        # Custom API: Memory endpoint
        location /api/memory {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Forwarded-Host $http_host;
        }

        # Custom API: MCP configuration endpoint
        location /api/mcp {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Forwarded-Host $http_host;
        }

        # Custom API: Skills configuration endpoint
        location /api/skills {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Forwarded-Host $http_host;
        }

        # Custom API: Agents endpoint
        location /api/agents {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Forwarded-Host $http_host;
        }

        # Custom API: Uploads endpoint
        # yyds: 文件上传路由，client_max_body_size 100M 允许大文件
        location ~ ^/api/threads/[^/]+/uploads {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;

            # Large file upload support
            client_max_body_size 100M;
            proxy_request_buffering off;

            # Disable response buffering to avoid permission errors
            proxy_buffering off;
            proxy_cache off;
        }

        # Custom API: Other endpoints under /api/threads
        location ~ ^/api/threads {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Forwarded-Host $http_host;
        }

        # ── API 文档路由 ──────────────────────────────────────────────────────

        # API Documentation: Swagger UI
        # yyds: 访问 http://localhost:2026/api/docs 可以看到 Swagger 文档
        location /api/docs {
            proxy_pass http://gateway/docs  ;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Forwarded-Host $http_host;
        }

        # API Documentation: ReDoc
        location /api/redoc {
            proxy_pass http://gateway/redoc;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Forwarded-Host $http_host;
        }

        # API Documentation: OpenAPI Schema
        location /openapi.json {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Forwarded-Host $http_host;
        }

        # ── 健康检查 ──────────────────────────────────────────────────────────
        # yyds: 访问 http://localhost:2026/health → Gateway 返回 {"status": "healthy"}
        # Health check endpoint (gateway)
        location /health {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_buffering off;
            proxy_cache off;
            proxy_set_header X-Forwarded-Host $http_host;
        }

        # ── /api/* 兜底路由 ───────────────────────────────────────────────────
        # Catch-all for any /api/* prefix not matched by a more specific block above.
        # yyds: 上面没匹配到的 /api/* 都走这里，包括：
        #       auth 模块（/api/v1/auth/login, /me, /change-password）
        #       feedback、runs、token-usage 等新增的路由
        #       nginx 的最长前缀匹配保证上面的精确路由优先
        # Covers the auth module (/api/v1/auth/login, /me, /change-password, ...),
        # plus feedback / runs / token-usage routes that 2.0-rc added without
        # updating this nginx config. Longest-prefix matching ensures the explicit
        # blocks above (/api/models, /api/threads regex, /api/langgraph/, ...) still
        # win for their paths — only truly unmatched /api/* requests land here.
        location /api/ {
            proxy_pass http://gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;

            # Auth endpoints set HttpOnly cookies — make sure nginx doesn't
            # strip the Set-Cookie header from upstream responses.
            # yyds: auth 登录会设置 HttpOnly Cookie（存 session），
            #       必须让 nginx 透传 Set-Cookie 头，否则登录态丢失
            proxy_pass_header Set-Cookie;

            # Disable buffering to avoid permission errors when nginx
            # runs as a non-root user (e.g. local development).
            proxy_buffering off;
            proxy_cache off;
        }

        # ── 前端兜底路由 ──────────────────────────────────────────────────────
        # All other requests go to frontend
        # yyds: 所有非 /api/* 的请求都转给 Frontend(:3000)
        #       包括 HTML 页面、JS/CSS 静态资源、图片等
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;

            # Headers
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            # yyds: WebSocket 支持（Next.js 热更新用 WebSocket）
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;

            # yyds: 关闭响应缓冲，解决非 root 用户启动 nginx 时的权限问题
            #       nginx 默认会把大响应缓存到 /var/lib/nginx/proxy（需要 root 权限）
            #       dev 模式下用非 root 启动会 Permission denied
            #       关掉后直接透传，不走临时文件
            # Disable response buffering for the frontend. Without this,
            # nginx tries to spool large upstream responses (e.g. Next.js
            # static chunks) into ``proxy_temp_path``, which defaults to
            # the system-owned ``/var/lib/nginx/proxy`` and fails with
            # ``[crit] open() ... failed (13: Permission denied)`` when
            # nginx is launched as a non-root user (every dev machine
            # except production root containers). The symptom on the
            # client side is ``ERR_INCOMPLETE_CHUNKED_ENCODING`` and
            # ``ChunkLoadError`` partway through page hydration.
            #
            # Streaming the response straight through avoids the
            # temp-file path entirely. The frontend already sets its
            # own cache headers, so we don't lose anything from
            # disabling nginx-side buffering.
            proxy_buffering off;
            proxy_request_buffering off;

            # Timeouts
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }
    }
}
